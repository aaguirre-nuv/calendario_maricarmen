<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Cal MC"/>
  <title>Calendario Maricarmen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EFEFEF; font-family: 'Segoe UI', Arial, sans-serif; }
    select { -webkit-appearance: auto; }
    .today-anchor { scroll-margin-top: 70px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const BIN_ID  = "6a2e5b6cf5f4af5e29ef0626";
    const API_KEY = "$2a$10$2Y9gS7sOIARKbtHusrv.B.gSVjDbAB.ggWQ4GqafsJc24MRrjodrG";
    const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const CATEGORIES = {
      medico:    { label:"MÉDICO",    emoji:"🏥", color:"#C0392B", bg:"#FFF5F5", border:"#E74C3C" },
      familia:   { label:"FAMILIA",   emoji:"🏠", color:"#C47000", bg:"#FFFBF0", border:"#F39C12" },
      amigas:    { label:"AMIGAS",    emoji:"💜", color:"#7D6EE8", bg:"#F8F6FF", border:"#9B8FF5" },
      actividad: { label:"ACTIVIDAD", emoji:"🌸", color:"#1A8A6A", bg:"#F0FAF6", border:"#27AE80" },
      otro:      { label:"OTRO",      emoji:"📌", color:"#555",    bg:"#F7F7F7", border:"#BBBBBB" },
    };

    const DAY_NAMES  = ["DOMINGO","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO"];
    const MONTH_NAMES = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
    const DAY_TINTS  = ["#F9F9F9","#FAFBFF","#FDFAF5","#F8FBFF","#FBF8FF","#F5FBFA","#FFFBF5"];

    function toKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,"0");
      const d = String(date.getDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }

    // Build array of Date objects: today + 61 more days (≈2 months)
    function buildDays() {
      const today = new Date(); today.setHours(0,0,0,0);
      return Array.from({length:62}, (_,i) => {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        return d;
      });
    }

    function isSameDay(a,b) {
      return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    }

    function App() {
      const [mode, setMode]       = useState("view");
      const [events, setEvents]   = useState({});
      const [editKey, setEditKey] = useState(null);
      const [editIdx, setEditIdx] = useState(null);
      const [form, setForm]       = useState({time:"12:00",text:"",category:"medico"});
      const [status, setStatus]   = useState("loading");
      const [saving, setSaving]   = useState(false);
      const todayRef              = useRef(null);
      const isView                = mode === "view";
      const days                  = buildDays();
      const today                 = days[0];

      const fetchEvents = useCallback(async () => {
        setStatus("loading");
        try {
          const r    = await fetch(`${BIN_URL}/latest`, {headers:{"X-Master-Key":API_KEY}});
          const json = await r.json();
          setEvents(json.record?.events || {});
          setStatus("ok");
        } catch { setStatus("error"); }
      }, []);

      useEffect(() => { fetchEvents(); }, [fetchEvents]);

      // Scroll to today after load
      useEffect(() => {
        if (status==="ok" && todayRef.current) {
          setTimeout(() => todayRef.current?.scrollIntoView({behavior:"smooth", block:"start"}), 100);
        }
      }, [status]);

      async function saveEvents(ne) {
        setEvents(ne);
        setSaving(true);
        try {
          await fetch(BIN_URL, {
            method:"PUT",
            headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
            body: JSON.stringify({events:ne})
          });
        } catch {}
        setSaving(false);
      }

      function openAdd(key)        { setEditKey(key); setEditIdx(null); setForm({time:"12:00",text:"",category:"medico"}); }
      function openEdit(key,eIdx)  { const e=events[key][eIdx]; setEditKey(key); setEditIdx(eIdx); setForm({time:e.time,text:e.text,category:e.category}); }
      function closeModal()        { setEditKey(null); setEditIdx(null); }

      function handleSave() {
        if (!form.text.trim()) return;
        const ne={...events};
        const de=[...(ne[editKey]||[])];
        if (editIdx!==null) de[editIdx]={...form};
        else de.push({...form});
        de.sort((a,b)=>(a.time||"").localeCompare(b.time||""));
        ne[editKey]=de;
        saveEvents(ne); closeModal();
      }

      function handleDelete() {
        const ne={...events};
        const de=[...(ne[editKey]||[])];
        de.splice(editIdx,1);
        if (de.length===0) delete ne[editKey]; else ne[editKey]=de;
        saveEvents(ne); closeModal();
      }

      function scrollToToday() {
        todayRef.current?.scrollIntoView({behavior:"smooth", block:"start"});
      }

      /* ── LOADING ── */
      if (status==="loading") return (
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",gap:16}}>
          <div style={{fontSize:52}}>📅</div>
          <div style={{fontSize:22,color:"#888",fontWeight:700}}>Cargando…</div>
        </div>
      );

      /* ── ERROR ── */
      if (status==="error") return (
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",gap:16,padding:24}}>
          <div style={{fontSize:52}}>⚠️</div>
          <div style={{fontSize:20,color:"#C0392B",fontWeight:700,textAlign:"center"}}>No se pudo conectar</div>
          <button onClick={fetchEvents} style={{background:"#6C5CE7",color:"white",border:"none",borderRadius:12,padding:"14px 28px",fontSize:16,fontWeight:700,cursor:"pointer"}}>Reintentar</button>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"#EFEFEF"}}>

          {/* ── HEADER fijo ── */}
          <div style={{position:"sticky",top:0,zIndex:10,background:"#5A4FCC",padding:"10px 14px",boxShadow:"0 3px 12px rgba(0,0,0,0.2)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <button onClick={scrollToToday} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.35)",borderRadius:8,color:"white",fontSize:13,fontWeight:700,padding:"7px 12px",cursor:"pointer",letterSpacing:1}}>
                ⭐ HOY
              </button>
              <div style={{color:"white",fontSize:15,fontWeight:900,letterSpacing:0.5}}>
                MARICARMEN
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {saving && <span style={{color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:600}}>💾</span>}
                <button onClick={()=>setMode(m=>m==="view"?"edit":"view")} style={{background:"rgba(255,255,255,0.15)",border:"2px solid rgba(255,255,255,0.45)",borderRadius:10,color:"white",fontSize:13,fontWeight:700,padding:"7px 12px",cursor:"pointer"}}>
                  {isView?"✏️ EDITAR":"👁️ VER"}
                </button>
              </div>
            </div>
          </div>

          {/* ── DAYS SCROLL ── */}
          <div style={{padding:"10px 10px 40px",display:"flex",flexDirection:"column",gap:0}}>
            {days.map((date,idx) => {
              const key      = toKey(date);
              const isToday  = isSameDay(date, today);
              const dow      = date.getDay(); // 0=Sun
              const dayName  = DAY_NAMES[dow];
              const dayEvts  = events[key] || [];
              const isFirst  = idx === 0;
              // Month separator: show when day=1 or first in list
              const showMonth = date.getDate()===1 || isFirst;

              return (
                <div key={key}>
                  {/* Month separator */}
                  {showMonth && (
                    <div style={{
                      padding:"18px 4px 8px",
                      fontSize:13, fontWeight:900, color:"#999",
                      letterSpacing:3, textTransform:"uppercase",
                      borderBottom:"2px solid #DCDCDC",
                      marginBottom:10,
                      marginTop: isFirst ? 0 : 16
                    }}>
                      {MONTH_NAMES[date.getMonth()]} {date.getFullYear()}
                    </div>
                  )}

                  {/* Day card */}
                  <div
                    ref={isToday ? todayRef : null}
                    className="today-anchor"
                    style={{
                      background: isToday ? "#EDE9FF" : DAY_TINTS[dow],
                      border: isToday ? "4px solid #6C5CE7" : "2px solid #D8D8D8",
                      borderRadius:20,
                      overflow:"hidden",
                      marginBottom:12,
                      boxShadow: isToday ? "0 6px 28px rgba(108,92,231,0.22)" : "0 2px 8px rgba(0,0,0,0.05)",
                    }}
                  >
                    {/* Day header */}
                    <div style={{
                      background: isToday ? "#6C5CE7" : "#DCDCDC",
                      padding: isView ? "13px 18px" : "10px 14px",
                      display:"flex", alignItems:"center",
                      justifyContent:"space-between"
                    }}>
                      <div style={{display:"flex",alignItems:"center",gap:14}}>
                        {isView ? (
                          <>
                            <div style={{background:isToday?"rgba(255,255,255,0.22)":"white",borderRadius:14,width:74,height:74,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.1)",flexShrink:0}}>
                              <div style={{fontSize:44,fontWeight:900,color:isToday?"white":"#333",lineHeight:1}}>{date.getDate()}</div>
                            </div>
                            <div>
                              <div style={{fontSize:32,fontWeight:900,color:isToday?"white":"#333",letterSpacing:1}}>{dayName}</div>
                              {isToday && <div style={{fontSize:15,color:"rgba(255,255,255,0.9)",fontWeight:800,marginTop:3,letterSpacing:3}}>⭐ HOY</div>}
                            </div>
                          </>
                        ) : (
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{fontWeight:800,fontSize:15,color:isToday?"#6C5CE7":"#444"}}>
                              {dayName.charAt(0)+dayName.slice(1).toLowerCase()} {date.getDate()}
                            </div>
                            {isToday && <span style={{fontSize:11,background:"#6C5CE7",color:"white",borderRadius:6,padding:"2px 7px",fontWeight:700,letterSpacing:1}}>HOY</span>}
                          </div>
                        )}
                      </div>

                      {/* Add button in edit mode */}
                      {!isView && (
                        <button onClick={()=>openAdd(key)} style={{background:"#6C5CE7",color:"white",border:"none",borderRadius:8,padding:"5px 12px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}}>
                          + Añadir
                        </button>
                      )}
                    </div>

                    {/* Events */}
                    <div style={{padding: dayEvts.length>0 ? "10px 10px" : "0", display:"flex",flexDirection:"column",gap:isView?10:6}}>
                      {isView && dayEvts.length===0 && (
                        <div style={{color:"#CCCCCC",fontSize:20,padding:"10px 10px",fontStyle:"italic",fontWeight:600}}>DÍA LIBRE 🌤️</div>
                      )}
                      {dayEvts.map((evt,eIdx) => {
                        const cat = CATEGORIES[evt.category]||CATEGORIES.otro;
                        return isView ? (
                          <div key={eIdx} style={{background:cat.bg,border:`3px solid ${cat.border}`,borderLeft:`8px solid ${cat.border}`,borderRadius:16,padding:"16px 18px",display:"flex",alignItems:"center",gap:16}}>
                            <div style={{fontSize:60,lineHeight:1,minWidth:68,textAlign:"center",flexShrink:0}}>{cat.emoji}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:28,fontWeight:900,color:"#111",lineHeight:1.2,textTransform:"uppercase"}}>{evt.text}</div>
                              {evt.time && <div style={{fontSize:26,color:cat.color,fontWeight:800,marginTop:6}}>🕐 {evt.time}</div>}
                              <div style={{display:"inline-block",marginTop:8,background:cat.border,borderRadius:7,padding:"4px 12px",fontSize:14,fontWeight:900,color:"white",letterSpacing:2,textTransform:"uppercase"}}>{cat.label}</div>
                            </div>
                          </div>
                        ) : (
                          <div key={eIdx} onClick={()=>openEdit(key,eIdx)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:cat.bg,border:`1px solid ${cat.border}`,borderLeft:`4px solid ${cat.border}`,borderRadius:8,cursor:"pointer",margin:"0 4px"}}>
                            <span style={{fontSize:20}}>{cat.emoji}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:14,fontWeight:700,color:"#222",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{evt.text}</div>
                              {evt.time && <div style={{fontSize:12,color:cat.color,fontWeight:600}}>🕐 {evt.time}</div>}
                            </div>
                            <div style={{fontSize:12,color:cat.color,fontWeight:700,background:"white",border:`1px solid ${cat.border}`,borderRadius:6,padding:"2px 8px",whiteSpace:"nowrap"}}>{cat.label}</div>
                            <div style={{color:"#CCC",fontSize:16}}>›</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── MODAL ── */}
          {editKey!==null && (
            <div onClick={e=>e.target===e.currentTarget&&closeModal()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"20px"}}>
              <div style={{background:"white",borderRadius:16,padding:"24px 22px 28px",width:"100%",maxWidth:420,boxShadow:"0 8px 32px rgba(0,0,0,0.18)",maxHeight:"90vh",overflowY:"auto"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#222"}}>
                    {editIdx!==null?"Editar evento":"Añadir evento"} — {editKey}
                  </div>
                  <button onClick={closeModal} style={{background:"#F0F0F0",border:"none",borderRadius:"50%",width:34,height:34,fontSize:18,cursor:"pointer",color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>

                {/* Tipo */}
                <div style={{marginBottom:18}}>
                  <label style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:8}}>Tipo</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {Object.entries(CATEGORIES).map(([k,cat])=>(
                      <button key={k} onClick={()=>setForm(f=>({...f,category:k}))} style={{background:form.category===k?cat.border:"white",border:`2px solid ${form.category===k?cat.border:"#DEDEDE"}`,borderRadius:20,padding:"7px 14px",fontSize:14,fontWeight:700,cursor:"pointer",color:form.category===k?"white":"#888",display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:18}}>{cat.emoji}</span>
                        {cat.label.charAt(0)+cat.label.slice(1).toLowerCase()}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Hora */}
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Hora (opcional)</label>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <select value={form.time?form.time.split(":")[0]:"12"} onChange={e=>{const m=form.time?form.time.split(":")[1]:"00";setForm(f=>({...f,time:`${e.target.value}:${m}`}));}} style={{flex:1,padding:"10px 8px",fontSize:18,borderRadius:10,border:"1.5px solid #DEDEDE",outline:"none",fontWeight:700,color:"#333",background:"white"}}>
                      {Array.from({length:24},(_,i)=>String(i).padStart(2,"0")).map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                    <span style={{fontSize:22,fontWeight:800,color:"#888"}}>:</span>
                    <select value={form.time?form.time.split(":")[1]:"00"} onChange={e=>{const h=form.time?form.time.split(":")[0]:"12";setForm(f=>({...f,time:`${h}:${e.target.value}`}));}} style={{flex:1,padding:"10px 8px",fontSize:18,borderRadius:10,border:"1.5px solid #DEDEDE",outline:"none",fontWeight:700,color:"#333",background:"white"}}>
                      {["00","15","30","45"].map(m=><option key={m} value={m}>{m}</option>)}
                    </select>
                  </div>
                </div>

                {/* Texto */}
                <div style={{marginBottom:22}}>
                  <label style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>¿Qué hay?</label>
                  <input type="text" value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))} placeholder="Ej: Revisión con el médico" style={{width:"100%",padding:"10px 14px",fontSize:16,borderRadius:10,border:"1.5px solid #DEDEDE",outline:"none",boxSizing:"border-box",fontWeight:600,color:"#333"}}/>
                </div>

                {/* Botones */}
                <div style={{display:"flex",gap:10}}>
                  {editIdx!==null && (
                    <button onClick={handleDelete} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #E74C3C",background:"#FFF5F5",color:"#C0392B",fontSize:14,fontWeight:700,cursor:"pointer"}}>🗑️ Borrar</button>
                  )}
                  <button onClick={handleSave} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:"#6C5CE7",color:"white",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 3px 10px rgba(108,92,231,0.3)"}}>
                    {editIdx!==null?"Guardar cambios":"✓ Añadir"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
