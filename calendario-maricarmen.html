<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Maricarmen"/>
  <title>Calendario Maricarmen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EFEFEF; font-family: 'Segoe UI', Arial, sans-serif; }
    select { -webkit-appearance: auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const BIN_ID  = "6a2e5b6cf5f4af5e29ef0626";
    const API_KEY = "$2a$10$2Y9gS7sOIARKbtHusrv.B.gSVjDbAB.ggWQ4GqafsJc24MRrjodrG";
    const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const CATEGORIES = {
      medico:    { label:"MÉDICO",    emoji:"🏥", color:"#C0392B", bg:"#FFF5F5", border:"#E74C3C" },
      familia:   { label:"FAMILIA",   emoji:"🏠", color:"#C47000", bg:"#FFFBF0", border:"#F39C12" },
      amigas:    { label:"AMIGAS",    emoji:"💜", color:"#7D6EE8", bg:"#F8F6FF", border:"#9B8FF5" },
      actividad: { label:"ACTIVIDAD", emoji:"🌸", color:"#1A8A6A", bg:"#F0FAF6", border:"#27AE80" },
      otro:      { label:"OTRO",      emoji:"📌", color:"#555",    bg:"#F7F7F7", border:"#BBBBBB" },
    };

    const DAYS      = ["LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO","DOMINGO"];
    const DAY_TINTS = ["#FAFBFF","#FDFAF5","#F8FBFF","#FBF8FF","#F5FBFA","#FFFBF5","#F9F9F9"];

    function toKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,"0");
      const d = String(date.getDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }

    function getMondayOf(date) {
      const d = new Date(date);
      d.setHours(0,0,0,0);
      const dow = d.getDay();
      const diff = dow === 0 ? 1 : -(dow - 1);
      d.setDate(d.getDate() + diff);
      return d;
    }

    function getWeekDays(monday) {
      return Array.from({length:7}, (_,i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return d;
      });
    }

    function isSameDay(a, b) {
      return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    }

    function formatWeekLabel(days) {
      const s = days[0], e = days[6];
      const ms = s.toLocaleDateString("es-ES",{month:"short"}).toUpperCase().replace(".","");
      const me = e.toLocaleDateString("es-ES",{month:"short"}).toUpperCase().replace(".","");
      if (s.getMonth()===e.getMonth())
        return `${s.getDate()}–${e.getDate()} ${ms} ${e.getFullYear()}`;
      return `${s.getDate()} ${ms} – ${e.getDate()} ${me} ${e.getFullYear()}`;
    }

    function App() {
      const [mode, setMode]         = useState("view");
      const [events, setEvents]     = useState({});
      const [weekMonday, setWeekMonday] = useState(() => getMondayOf(new Date()));
      const [editKey, setEditKey]   = useState(null);
      const [editIdx, setEditIdx]   = useState(null);
      const [form, setForm]         = useState({ time:"12:00", text:"", category:"medico" });
      const [status, setStatus]     = useState("loading");
      const [saving, setSaving]     = useState(false);

      const today    = new Date(); today.setHours(0,0,0,0);
      const weekDays = getWeekDays(weekMonday);
      const isView   = mode === "view";

      const fetchEvents = useCallback(async () => {
        setStatus("loading");
        try {
          const r    = await fetch(`${BIN_URL}/latest`, { headers:{"X-Master-Key":API_KEY} });
          const json = await r.json();
          setEvents(json.record?.events || {});
          setStatus("ok");
        } catch { setStatus("error"); }
      }, []);

      useEffect(() => { fetchEvents(); }, [fetchEvents]);

      async function saveEvents(ne) {
        setEvents(ne);
        setSaving(true);
        try {
          await fetch(BIN_URL, {
            method:"PUT",
            headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
            body: JSON.stringify({ events: ne })
          });
        } catch {}
        setSaving(false);
      }

      function openAdd(key)         { setEditKey(key); setEditIdx(null); setForm({time:"12:00",text:"",category:"medico"}); }
      function openEdit(key, eIdx)  { const e=events[key][eIdx]; setEditKey(key); setEditIdx(eIdx); setForm({time:e.time,text:e.text,category:e.category}); }
      function closeModal()         { setEditKey(null); setEditIdx(null); }

      function handleSave() {
        if (!form.text.trim()) return;
        const ne = {...events};
        const de = [...(ne[editKey]||[])];
        if (editIdx!==null) de[editIdx]={...form};
        else de.push({...form});
        de.sort((a,b)=>(a.time||"").localeCompare(b.time||""));
        ne[editKey]=de;
        saveEvents(ne); closeModal();
      }

      function handleDelete() {
        const ne={...events};
        const de=[...(ne[editKey]||[])];
        de.splice(editIdx,1);
        if (de.length===0) delete ne[editKey]; else ne[editKey]=de;
        saveEvents(ne); closeModal();
      }

      function prevWeek() { const d=new Date(weekMonday); d.setDate(d.getDate()-7); setWeekMonday(d); }
      function nextWeek() { const d=new Date(weekMonday); d.setDate(d.getDate()+7); setWeekMonday(d); }
      function goToday()  { setWeekMonday(getMondayOf(new Date())); }

      const isCurrentWeek = isSameDay(weekMonday, getMondayOf(new Date()));

      /* ── LOADING ── */
      if (status==="loading") return (
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",gap:16}}>
          <div style={{fontSize:52}}>📅</div>
          <div style={{fontSize:22,color:"#888",fontWeight:700}}>Cargando calendario…</div>
        </div>
      );

      /* ── ERROR ── */
      if (status==="error") return (
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",gap:16,padding:24}}>
          <div style={{fontSize:52}}>⚠️</div>
          <div style={{fontSize:20,color:"#C0392B",fontWeight:700,textAlign:"center"}}>No se pudo conectar</div>
          <button onClick={fetchEvents} style={{background:"#6C5CE7",color:"white",border:"none",borderRadius:12,padding:"14px 28px",fontSize:16,fontWeight:700,cursor:"pointer"}}>
            Reintentar
          </button>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"#EFEFEF",fontFamily:"'Segoe UI',Arial,sans-serif"}}>

          {/* ── HEADER ── */}
          <div style={{background:"#5A4FCC",padding:"10px 14px",boxShadow:"0 3px 12px rgba(0,0,0,0.18)",position:"sticky",top:0,zIndex:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{color:"white",fontSize:isView?22:17,fontWeight:900,letterSpacing:0.5}}>
                {formatWeekLabel(weekDays)}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {saving && <span style={{color:"rgba(255,255,255,0.7)",fontSize:12,fontWeight:600}}>Guardando…</span>}
                <button onClick={()=>setMode(m=>m==="view"?"edit":"view")} style={{
                  background:"rgba(255,255,255,0.15)",border:"2px solid rgba(255,255,255,0.45)",
                  borderRadius:10,color:"white",fontSize:14,fontWeight:700,padding:"8px 14px",cursor:"pointer"
                }}>
                  {isView?"✏️ EDITAR":"👁️ VER"}
                </button>
              </div>
            </div>
            {/* Nav */}
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={prevWeek} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"white",fontSize:20,fontWeight:700,padding:"5px 14px",cursor:"pointer"}}>‹</button>
              {!isCurrentWeek && (
                <button onClick={goToday} style={{background:"rgba(255,255,255,0.22)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:8,color:"white",fontSize:12,fontWeight:700,padding:"6px 12px",cursor:"pointer",letterSpacing:1}}>
                  ESTA SEMANA
                </button>
              )}
              <div style={{flex:1}}/>
              <button onClick={nextWeek} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"white",fontSize:20,fontWeight:700,padding:"5px 14px",cursor:"pointer"}}>›</button>
            </div>
          </div>

          {/* ── EDIT MODE ── */}
          {!isView && (
            <div style={{padding:"12px 12px 4px",display:"flex",flexDirection:"column",gap:6}}>
              <div style={{fontSize:12,color:"#999",fontWeight:600,textTransform:"uppercase",letterSpacing:2,marginBottom:4,paddingLeft:4}}>
                Toca un día para añadir o editar eventos
              </div>
              {weekDays.map((date,dIdx)=>{
                const key     = toKey(date);
                const isToday = isSameDay(date,today);
                const dayEvts = events[key]||[];
                return (
                  <div key={key} style={{background:"white",border:isToday?"2px solid #6C5CE7":"1px solid #E0E0E0",borderRadius:12,overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:isToday?"#F0EEFF":"#FAFAFA",borderBottom:dayEvts.length>0?"1px solid #EEEEEE":"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{fontWeight:800,fontSize:15,color:isToday?"#6C5CE7":"#444",minWidth:120}}>
                          {DAYS[dIdx].charAt(0)+DAYS[dIdx].slice(1).toLowerCase()} {date.getDate()}
                        </div>
                        {isToday && <span style={{fontSize:11,background:"#6C5CE7",color:"white",borderRadius:6,padding:"2px 7px",fontWeight:700,letterSpacing:1}}>HOY</span>}
                      </div>
                      <button onClick={()=>openAdd(key)} style={{background:"#6C5CE7",color:"white",border:"none",borderRadius:8,padding:"5px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                        + Añadir
                      </button>
                    </div>
                    {dayEvts.length>0 && (
                      <div style={{padding:"6px 10px",display:"flex",flexDirection:"column",gap:5}}>
                        {dayEvts.map((evt,eIdx)=>{
                          const cat=CATEGORIES[evt.category]||CATEGORIES.otro;
                          return (
                            <div key={eIdx} onClick={()=>openEdit(key,eIdx)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:cat.bg,border:`1px solid ${cat.border}`,borderLeft:`4px solid ${cat.border}`,borderRadius:8,cursor:"pointer"}}>
                              <span style={{fontSize:20}}>{cat.emoji}</span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:14,fontWeight:700,color:"#222",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{evt.text}</div>
                                {evt.time && <div style={{fontSize:12,color:cat.color,fontWeight:600}}>🕐 {evt.time}</div>}
                              </div>
                              <div style={{fontSize:12,color:cat.color,fontWeight:700,background:"white",border:`1px solid ${cat.border}`,borderRadius:6,padding:"2px 8px",whiteSpace:"nowrap"}}>{cat.label}</div>
                              <div style={{color:"#CCC",fontSize:16}}>›</div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── VIEW MODE ── */}
          {isView && (
            <div style={{padding:"12px 10px 6px",display:"flex",flexDirection:"column",gap:16}}>
              {weekDays.map((date,dIdx)=>{
                const key     = toKey(date);
                const isToday = isSameDay(date,today);
                const dayEvts = events[key]||[];
                return (
                  <div key={key} style={{background:isToday?"#EDE9FF":DAY_TINTS[dIdx],border:isToday?"4px solid #6C5CE7":"2px solid #D8D8D8",borderRadius:22,overflow:"hidden",boxShadow:isToday?"0 6px 28px rgba(108,92,231,0.22)":"0 2px 10px rgba(0,0,0,0.06)"}}>
                    <div style={{background:isToday?"#6C5CE7":"#DCDCDC",padding:"14px 20px",display:"flex",alignItems:"center",gap:16}}>
                      <div style={{background:isToday?"rgba(255,255,255,0.22)":"white",borderRadius:16,width:78,height:78,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.12)",flexShrink:0}}>
                        <div style={{fontSize:46,fontWeight:900,color:isToday?"white":"#333",lineHeight:1}}>{date.getDate()}</div>
                      </div>
                      <div>
                        <div style={{fontSize:34,fontWeight:900,color:isToday?"white":"#333",lineHeight:1,letterSpacing:1}}>{DAYS[dIdx]}</div>
                        {isToday && <div style={{fontSize:16,color:"rgba(255,255,255,0.9)",fontWeight:800,marginTop:4,letterSpacing:3}}>⭐ HOY</div>}
                      </div>
                    </div>
                    <div style={{padding:"12px 12px",display:"flex",flexDirection:"column",gap:10}}>
                      {dayEvts.length===0 && (
                        <div style={{color:"#C0C0C0",fontSize:22,padding:"12px 8px",fontStyle:"italic",fontWeight:600}}>DÍA LIBRE 🌤️</div>
                      )}
                      {dayEvts.map((evt,eIdx)=>{
                        const cat=CATEGORIES[evt.category]||CATEGORIES.otro;
                        return (
                          <div key={eIdx} style={{background:cat.bg,border:`3px solid ${cat.border}`,borderLeft:`8px solid ${cat.border}`,borderRadius:18,padding:"18px 20px",display:"flex",alignItems:"center",gap:18}}>
                            <div style={{fontSize:64,lineHeight:1,minWidth:72,textAlign:"center",flexShrink:0}}>{cat.emoji}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:30,fontWeight:900,color:"#111",lineHeight:1.2,textTransform:"uppercase",letterSpacing:0.5}}>{evt.text}</div>
                              {evt.time && <div style={{fontSize:28,color:cat.color,fontWeight:800,marginTop:8}}>🕐 {evt.time}</div>}
                              <div style={{display:"inline-block",marginTop:10,background:cat.border,borderRadius:8,padding:"5px 14px",fontSize:15,fontWeight:900,color:"white",letterSpacing:2,textTransform:"uppercase"}}>{cat.label}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              {/* Leyenda */}
              <div style={{padding:"0 0 20px"}}>
                <div style={{background:"white",border:"2px solid #DEDEDE",borderRadius:20,padding:"16px 18px"}}>
                  <div style={{fontSize:14,fontWeight:800,color:"#AAA",marginBottom:12,letterSpacing:2,textTransform:"uppercase"}}>LEYENDA</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                    {Object.entries(CATEGORIES).map(([k,cat])=>(
                      <div key={k} style={{display:"flex",alignItems:"center",gap:8,background:cat.bg,border:`2px solid ${cat.border}`,borderRadius:12,padding:"10px 16px"}}>
                        <span style={{fontSize:26}}>{cat.emoji}</span>
                        <span style={{fontSize:17,fontWeight:900,color:cat.color,textTransform:"uppercase",letterSpacing:1}}>{cat.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── MODAL ── */}
          {editKey!==null && (
            <div onClick={e=>e.target===e.currentTarget&&closeModal()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"20px"}}>
              <div style={{background:"white",borderRadius:16,padding:"24px 22px 28px",width:"100%",maxWidth:420,boxShadow:"0 8px 32px rgba(0,0,0,0.18)",maxHeight:"90vh",overflowY:"auto"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                  <div style={{fontSize:17,fontWeight:700,color:"#222"}}>
                    {editIdx!==null?"Editar evento":"Añadir evento"} — {editKey}
                  </div>
                  <button onClick={closeModal} style={{background:"#F0F0F0",border:"none",borderRadius:"50%",width:34,height:34,fontSize:18,cursor:"pointer",color:"#666",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>

                {/* Tipo */}
                <div style={{marginBottom:18}}>
                  <label style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:8}}>Tipo</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {Object.entries(CATEGORIES).map(([k,cat])=>(
                      <button key={k} onClick={()=>setForm(f=>({...f,category:k}))} style={{background:form.category===k?cat.border:"white",border:`2px solid ${form.category===k?cat.border:"#DEDEDE"}`,borderRadius:20,padding:"7px 14px",fontSize:14,fontWeight:700,cursor:"pointer",color:form.category===k?"white":"#888",display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:18}}>{cat.emoji}</span>
                        {cat.label.charAt(0)+cat.label.slice(1).toLowerCase()}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Hora */}
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Hora (opcional)</label>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <select value={form.time?form.time.split(":")[0]:"12"} onChange={e=>{const m=form.time?form.time.split(":")[1]:"00";setForm(f=>({...f,time:`${e.target.value}:${m}`}));}} style={{flex:1,padding:"10px 8px",fontSize:18,borderRadius:10,border:"1.5px solid #DEDEDE",outline:"none",fontWeight:700,color:"#333",background:"white"}}>
                      {Array.from({length:24},(_,i)=>String(i).padStart(2,"0")).map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                    <span style={{fontSize:22,fontWeight:800,color:"#888"}}>:</span>
                    <select value={form.time?form.time.split(":")[1]:"00"} onChange={e=>{const h=form.time?form.time.split(":")[0]:"12";setForm(f=>({...f,time:`${h}:${e.target.value}`}));}} style={{flex:1,padding:"10px 8px",fontSize:18,borderRadius:10,border:"1.5px solid #DEDEDE",outline:"none",fontWeight:700,color:"#333",background:"white"}}>
                      {["00","15","30","45"].map(m=><option key={m} value={m}>{m}</option>)}
                    </select>
                  </div>
                </div>

                {/* Texto */}
                <div style={{marginBottom:22}}>
                  <label style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>¿Qué hay?</label>
                  <input type="text" value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))} placeholder="Ej: Revisión con el médico" style={{width:"100%",padding:"10px 14px",fontSize:16,borderRadius:10,border:"1.5px solid #DEDEDE",outline:"none",boxSizing:"border-box",fontWeight:600,color:"#333"}}/>
                </div>

                {/* Botones */}
                <div style={{display:"flex",gap:10}}>
                  {editIdx!==null && (
                    <button onClick={handleDelete} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #E74C3C",background:"#FFF5F5",color:"#C0392B",fontSize:14,fontWeight:700,cursor:"pointer"}}>🗑️ Borrar</button>
                  )}
                  <button onClick={handleSave} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:"#6C5CE7",color:"white",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 3px 10px rgba(108,92,231,0.3)"}}>
                    {editIdx!==null?"Guardar cambios":"✓ Añadir"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
